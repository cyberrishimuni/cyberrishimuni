<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator · Cyber Rishimuni</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #0D0D0D;
            background: linear-gradient(145deg, #0D0D0D 0%, #121212 100%);
            font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* main card – dark theme */
        .password-card {
            background: #1A1A1A;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 56px;
            box-shadow: 0 25px 45px -10px rgba(0, 0, 0, 0.5),
                        0 2px 8px rgba(245, 158, 11, 0.2);
            padding: 3rem 3rem;
            text-align: center;
            border: 2px solid #2A2A2A;
            transition: box-shadow 0.3s, border-color 0.3s;
            max-width: 600px;
            width: 100%;
        }

        .password-card:hover {
            box-shadow: 0 30px 55px -8px rgba(245, 158, 11, 0.15);
            border-color: #F59E0B;
        }

        /* header */
        .password-header {
            font-size: 3rem;
            font-weight: 800;
            color: #F59E0B;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            font-family: 'Courier New', monospace;
        }

        .password-sub {
            font-size: 1.1rem;
            color: #A0A0A0;
            margin-bottom: 2rem;
            letter-spacing: 2px;
            border-bottom: 1px solid #2A2A2A;
            padding-bottom: 1rem;
        }

        /* password display */
        .password-display-section {
            background: #0D0D0D;
            border: 2px solid #2A2A2A;
            border-radius: 40px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .password-display-section:hover {
            border-color: #F59E0B;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }

        #passwordDisplay {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            color: #F59E0B;
            word-break: break-all;
            text-align: left;
            flex: 1;
            letter-spacing: 2px;
        }

        .copy-btn {
            background: none;
            border: none;
            color: #A0A0A0;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0 10px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            color: #F59E0B;
            transform: scale(1.1);
        }

        /* length slider */
        .length-section {
            margin-bottom: 2rem;
            text-align: left;
        }

        .length-label {
            color: #FFFFFF;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
        }

        .length-label span {
            color: #F59E0B;
            font-weight: bold;
            font-size: 1.3rem;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 10px;
            background: #2A2A2A;
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #F59E0B;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
            border: 2px solid #FF9F1C;
            transition: all 0.1s ease;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }

        /* options grid */
        .options-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 2rem;
        }

        .option-item {
            background: #0D0D0D;
            border: 2px solid #2A2A2A;
            border-radius: 30px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-item:hover {
            border-color: #F59E0B;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.2);
        }

        .option-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #F59E0B;
        }

        .option-item label {
            color: #FFFFFF;
            font-size: 1rem;
            cursor: pointer;
            flex: 1;
            text-align: left;
        }

        .option-badge {
            font-size: 1.2rem;
        }

        /* strength meter */
        .strength-section {
            background: #0D0D0D;
            border: 2px solid #2A2A2A;
            border-radius: 40px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .strength-label {
            color: #A0A0A0;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .strength-value {
            font-size: 1.2rem;
            font-weight: bold;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        .strength-weak {
            background: #dc2626;
            color: #FFFFFF;
            box-shadow: 0 0 15px #dc2626;
        }

        .strength-medium {
            background: #f59e0b;
            color: #0D0D0D;
            box-shadow: 0 0 15px #f59e0b;
        }

        .strength-strong {
            background: #10b981;
            color: #FFFFFF;
            box-shadow: 0 0 15px #10b981;
        }

        .strength-very-strong {
            background: #6366f1;
            color: #FFFFFF;
            box-shadow: 0 0 15px #6366f1;
        }

        /* generate button – amber theme */
        .generate-btn {
            display: none;
            background: #F59E0B;
            border: none;
            padding: 1.2rem 2rem;
            border-radius: 48px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #0D0D0D;
            text-shadow: 0 2px 5px rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 0 #b37008, 0 8px 20px rgba(245, 158, 11, 0.3);
            cursor: pointer;
            transition: all 0.1s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            border: 2px solid #FF9F1C;
            font-family: 'Segoe UI', sans-serif;
            width: 100%;
            transform: translateY(0);
            letter-spacing: 2px;
        }

        .generate-btn:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #8e5a0a, 0 10px 20px rgba(245, 158, 11, 0.3);
        }

        /* Cyber Rishimuni Logo - EXACT same as counter app */
        .cyber-logo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-family: "Segoe UI", sans-serif;
            transition: transform 0.3s ease;
        }

        .cyber-logo:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Logo Image */
        .cyber-logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #F59E0B;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        /* Text */
        .cyber-logo .logo-text {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 600;
            color: #F59E0B;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
            background: rgba(26, 26, 26, 0.8);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #F59E0B;
            backdrop-filter: blur(5px);
            font-family: 'Courier New', monospace;
        }

        /* Decoration Square */
        .logo-decoration {
            width: 10px;
            height: 40px;
            background: linear-gradient(180deg, #ff9800, #ff6a00);
            border-radius: 3px;
            transition: box-shadow 0.3s ease;
        }

        .cyber-logo:hover .logo-decoration {
            box-shadow: 0 0 10px #ff9800;
        }

        /* subtle background effect */
        .bg-bling {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(245, 158, 11, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(245, 158, 11, 0.05) 0%, transparent 45%);
            pointer-events: none;
            z-index: 1;
        }

        /* small screen adaptation */
        @media (max-width: 550px) {
            .password-card {
                padding: 2rem 1.5rem;
            }
            .password-header {
                font-size: 2.2rem;
            }
            .options-section {
                grid-template-columns: 1fr;
            }
            #passwordDisplay {
                font-size: 1.2rem;
            }
            .cyber-logo { 
                bottom: 10px; 
                right: 10px; 
            }
            .cyber-logo .logo-text { 
                font-size: 18px; 
                padding: 6px 12px; 
            }
            .cyber-logo img { 
                width: 35px; 
                height: 35px; 
            }
            .logo-decoration { 
                height: 35px; 
            }
        }

        @media (max-width: 450px) {
            .cyber-logo .logo-text { 
                font-size: 14px; 
                padding: 4px 8px; 
            }
            .cyber-logo img { 
                width: 30px; 
                height: 30px; 
            }
            .logo-decoration { 
                height: 30px; 
                width: 8px;
            }
            .password-header {
                font-size: 1.8rem;
            }
            .generate-btn {
                font-size: 1.2rem;
            }
        }

        /* ultra-wide screens */
        @media (min-width: 1600px) {
            .cyber-logo { bottom: 30px; right: 30px; }
            .cyber-logo .logo-text { font-size: 28px; }
        }
    </style>
</head>
<body>
    <!-- background spark -->
    <div class="bg-bling"></div>

    <!-- main password card -->
    <div class="password-card">
        <div class="password-header">PASSWORD</div>
        <div class="password-sub">⚡ generator · strong & secure</div>
        
        <!-- password display -->
        <div class="password-display-section">
            <div id="passwordDisplay">Click Generate</div>
            <button class="copy-btn" id="copyBtn" title="Copy to clipboard">📋</button>
        </div>

        <!-- length slider -->
        <div class="length-section">
            <div class="length-label">
                Length <span id="lengthValue">12</span>
            </div>
            <input type="range" class="slider" id="lengthSlider" min="4" max="32" value="12">
        </div>

        <!-- options - user choice -->
        <div class="options-section">
            <div class="option-item">
                <input type="checkbox" id="uppercase" checked>
                <label for="uppercase">Uppercase</label>
                <span class="option-badge">ABC</span>
            </div>
            <div class="option-item">
                <input type="checkbox" id="lowercase" checked>
                <label for="lowercase">Lowercase</label>
                <span class="option-badge">abc</span>
            </div>
            <div class="option-item">
                <input type="checkbox" id="numbers" checked>
                <label for="numbers">Numbers</label>
                <span class="option-badge">123</span>
            </div>
            <div class="option-item">
                <input type="checkbox" id="symbols">
                <label for="symbols">Symbols</label>
                <span class="option-badge">!@#</span>
            </div>
            <div class="option-item">
                <input type="checkbox" id="excludeSimilar">
                <label for="excludeSimilar">Exclude Similar</label>
                <span class="option-badge">iIl1O0</span>
            </div>
            <div class="option-item">
                <input type="checkbox" id="noDuplicate">
                <label for="noDuplicate">No Duplicate</label>
                <span class="option-badge">unique</span>
            </div>
        </div>

        <!-- strength meter -->
        <div class="strength-section">
            <span class="strength-label">Password Strength</span>
            <span class="strength-value" id="strengthValue">MEDIUM</span>
        </div>

        <!-- generate button -->
        <button class="generate-btn" id="generateBtn"></button>
    </div>

    <!-- Cyber Rishimuni Logo - EXACT same as counter app with image.jpg -->
    <div class="cyber-logo" onclick="window.open('https://cyberrishimuni.github.io/cyberrishimuni/', '_blank')">
        <div class="logo-text">
            <img src="../image.jpg" alt="Cyber Rishimuni Logo">
            CYBER RISHIMUNI
        </div>
    </div>

    <script>
        (function() {
            // DOM elements
            const passwordDisplay = document.getElementById('passwordDisplay');
            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const lengthSlider = document.getElementById('lengthSlider');
            const lengthValue = document.getElementById('lengthValue');
            const strengthValue = document.getElementById('strengthValue');

            // Checkboxes
            const uppercaseCheck = document.getElementById('uppercase');
            const lowercaseCheck = document.getElementById('lowercase');
            const numbersCheck = document.getElementById('numbers');
            const symbolsCheck = document.getElementById('symbols');
            const excludeSimilarCheck = document.getElementById('excludeSimilar');
            const noDuplicateCheck = document.getElementById('noDuplicate');

            // Character sets
            const uppercaseChars = 'ABCDEFGHJKLMNPQRSTUVWXYZ'; // Removed I, O to avoid confusion
            const lowercaseChars = 'abcdefghijkmnopqrstuvwxyz'; // Removed l
            const numberChars = '23456789'; // Removed 0,1
            const symbolChars = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            const similarChars = 'il1Lo0O';

            // Update length display
            lengthSlider.addEventListener('input', () => {
                lengthValue.textContent = lengthSlider.value;
            });

            // Generate password
            function generatePassword() {
                let chars = '';
                let password = '';

                // Build character set based on selections
                if (uppercaseCheck.checked) chars += uppercaseChars;
                if (lowercaseCheck.checked) chars += lowercaseChars;
                if (numbersCheck.checked) chars += numberChars;
                if (symbolsCheck.checked) chars += symbolChars;

                // Check if at least one option is selected
                if (chars === '') {
                    alert('Select at least one character type!');
                    return '';
                }

                const length = parseInt(lengthSlider.value);
                let availableChars = chars;

                // Generate password
                for (let i = 0; i < length; i++) {
                    let randomChar;
                    
                    if (noDuplicateCheck.checked) {
                        // Ensure no duplicate characters
                        do {
                            randomChar = availableChars[Math.floor(Math.random() * availableChars.length)];
                        } while (password.includes(randomChar) && availableChars.length > password.length);
                    } else {
                        randomChar = availableChars[Math.floor(Math.random() * availableChars.length)];
                    }

                    // Check for similar characters if option is selected
                    if (excludeSimilarCheck.checked) {
                        while (similarChars.includes(randomChar)) {
                            randomChar = availableChars[Math.floor(Math.random() * availableChars.length)];
                        }
                    }

                    password += randomChar;
                }

                return password;
            }

            // Calculate password strength
            function calculateStrength(password) {
                let score = 0;
                
                // Length score
                if (password.length >= 8) score += 1;
                if (password.length >= 12) score += 1;
                if (password.length >= 16) score += 1;
                if (password.length >= 24) score += 1;

                // Character variety score
                if (/[A-Z]/.test(password)) score += 1;
                if (/[a-z]/.test(password)) score += 1;
                if (/[0-9]/.test(password)) score += 1;
                if (/[^A-Za-z0-9]/.test(password)) score += 2;

                // Determine strength level
                if (score <= 2) return { text: 'WEAK', class: 'strength-weak' };
                if (score <= 4) return { text: 'MEDIUM', class: 'strength-medium' };
                if (score <= 6) return { text: 'STRONG', class: 'strength-strong' };
                return { text: 'VERY STRONG', class: 'strength-very-strong' };
            }

            // Update password display and strength
            function updatePassword() {
                const password = generatePassword();
                if (password) {
                    passwordDisplay.textContent = password;
                    
                    const strength = calculateStrength(password);
                    strengthValue.textContent = strength.text;
                    strengthValue.className = 'strength-value ' + strength.class;
                }
            }

            // Copy to clipboard
            async function copyPassword() {
                if (passwordDisplay.textContent && passwordDisplay.textContent !== 'Click Generate') {
                    try {
                        await navigator.clipboard.writeText(passwordDisplay.textContent);
                        
                        // Visual feedback
                        const originalText = copyBtn.textContent;
                        copyBtn.textContent = '✓';
                        setTimeout(() => {
                            copyBtn.textContent = originalText;
                        }, 1500);
                    } catch (err) {
                        alert('Failed to copy!');
                    }
                }
            }

            // Event listeners
            generateBtn.addEventListener('click', updatePassword);
            copyBtn.addEventListener('click', copyPassword);

            // Update on option change
            [uppercaseCheck, lowercaseCheck, numbersCheck, symbolsCheck, excludeSimilarCheck, noDuplicateCheck].forEach(checkbox => {
                checkbox.addEventListener('change', () => {
                    if (passwordDisplay.textContent !== 'Click Generate') {
                        updatePassword();
                    }
                });
            });

            // Update on length change
            lengthSlider.addEventListener('input', () => {
                if (passwordDisplay.textContent !== 'Click Generate') {
                    updatePassword();
                }
            });

            // Generate initial password
            updatePassword();

            // Ensure at least one option is always checked
            function validateOptions() {
                if (!uppercaseCheck.checked && !lowercaseCheck.checked && !numbersCheck.checked && !symbolsCheck.checked) {
                    // Default to lowercase if none selected
                    lowercaseCheck.checked = true;
                }
            }

            [uppercaseCheck, lowercaseCheck, numbersCheck, symbolsCheck].forEach(checkbox => {
                checkbox.addEventListener('change', validateOptions);
            });
        })();
    </script>
</body>
</html>
