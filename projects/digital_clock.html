<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock · Cyber Rishimuni</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: #0D0D0D;
            background: linear-gradient(145deg, #0D0D0D 0%, #121212 100%);
            font-family: 'Segoe UI', 'Arial', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* main card – dark theme */
        .clock-card {
            background: #1A1A1A;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 56px;
            box-shadow: 0 25px 45px -10px rgba(0, 0, 0, 0.5),
                        0 2px 8px rgba(245, 158, 11, 0.2);
            padding: 3rem 4rem;
            text-align: center;
            border: 2px solid #2A2A2A;
            transition: box-shadow 0.3s, border-color 0.3s;
            max-width: 800px;
            width: 100%;
        }

        .clock-card:hover {
            box-shadow: 0 30px 55px -8px rgba(245, 158, 11, 0.15);
            border-color: #F59E0B;
        }

        /* time display – amber theme */
        .time-display {
            font-size: 6rem;
            font-weight: 700;
            line-height: 1.2;
            color: #F59E0B;
            text-shadow: 0 0 20px rgba(245, 158, 11, 0.3), 
                        0 0 40px rgba(245, 158, 11, 0.2);
            letter-spacing: 8px;
            margin-bottom: 0.5rem;
            font-family: 'Courier New', monospace;
        }

        /* date display */
        .date-display {
            font-size: 2rem;
            letter-spacing: 4px;
            color: #A0A0A0;
            background: #1A1A1A;
            display: inline-block;
            padding: 0.5rem 2rem;
            border-radius: 60px;
            font-weight: 400;
            box-shadow: inset 0 -2px 5px #2A2A2A;
            margin-bottom: 2rem;
            border: 1px solid #2A2A2A;
            font-family: 'Segoe UI', monospace;
        }

        /* format toggle button – amber theme */
        .format-btn {
            background: #F59E0B;
            border: none;
            padding: 1rem 3rem;
            border-radius: 48px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #0D0D0D;
            text-shadow: 0 2px 5px rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 0 #b37008, 0 8px 20px rgba(245, 158, 11, 0.3);
            cursor: pointer;
            transition: all 0.1s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            border: 2px solid #FF9F1C;
            font-family: 'Segoe UI', sans-serif;
            line-height: 1.2;
            margin: 1rem 0 0.5rem;
            transform: translateY(0);
        }

        .format-btn:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #8e5a0a, 0 10px 20px rgba(245, 158, 11, 0.3);
        }

        /* seconds toggle */
        .seconds-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            color: #A0A0A0;
            font-size: 1.2rem;
        }

        .seconds-toggle input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #F59E0B;
        }

        /* day display */
        .day-display {
            color: #F59E0B;
            font-size: 1.5rem;
            margin-top: 1rem;
            opacity: 0.9;
            letter-spacing: 2px;
        }

        /* hint text */
        .sub-hint {
            color: #A0A0A0;
            font-size: 1.1rem;
            opacity: 0.8;
            margin-top: 2rem;
            letter-spacing: 0.5px;
        }

        /* Cyber Rishimuni Logo - EXACT same as counter app */
        .cyber-logo {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-family: "Segoe UI", sans-serif;
            transition: transform 0.3s ease;
        }

        .cyber-logo:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* Logo Image - exact same styling */
        .cyber-logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #F59E0B;
            box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
        }

        /* Text - exact same styling */
        .cyber-logo .logo-text {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 22px;
            font-weight: 600;
            color: #F59E0B;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
            background: rgba(26, 26, 26, 0.8);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid #F59E0B;
            backdrop-filter: blur(5px);
            font-family: 'Courier New', monospace;
        }

        /* Decoration Square */
        .logo-decoration {
            width: 10px;
            height: 40px;
            background: linear-gradient(180deg, #ff9800, #ff6a00);
            border-radius: 3px;
            transition: box-shadow 0.3s ease;
        }

        .cyber-logo:hover .logo-decoration {
            box-shadow: 0 0 10px #ff9800;
        }

        /* subtle background effect */
        .bg-bling {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(245, 158, 11, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(245, 158, 11, 0.05) 0%, transparent 45%);
            pointer-events: none;
            z-index: 1;
        }

        /* small screen adaptation */
        @media (max-width: 650px) {
            .time-display { 
                font-size: 4rem; 
                letter-spacing: 4px;
            }
            .date-display { 
                font-size: 1.5rem; 
                padding: 0.3rem 1.2rem; 
            }
            .format-btn { 
                font-size: 1.5rem; 
                padding: 0.8rem 2rem; 
            }
            .clock-card { 
                padding: 2rem 2rem; 
            }
            .day-display { 
                font-size: 1.2rem; 
            }
            .cyber-logo { 
                bottom: 10px; 
                right: 10px; 
            }
            .cyber-logo .logo-text { 
                font-size: 18px; 
                padding: 6px 12px; 
            }
            .cyber-logo img { 
                width: 35px; 
                height: 35px; 
            }
            .logo-decoration { 
                height: 35px; 
            }
        }

        @media (max-width: 450px) {
            .time-display { 
                font-size: 2.8rem; 
                letter-spacing: 2px;
            }
            .date-display { 
                font-size: 1.2rem; 
                padding: 0.2rem 1rem; 
            }
            .format-btn { 
                font-size: 1.2rem; 
                padding: 0.6rem 1.5rem; 
            }
            .cyber-logo .logo-text { 
                font-size: 14px; 
                padding: 4px 8px; 
            }
            .cyber-logo img { 
                width: 30px; 
                height: 30px; 
            }
            .logo-decoration { 
                height: 30px; 
                width: 8px;
            }
        }

        /* ultra-wide screens */
        @media (min-width: 1600px) {
            .cyber-logo { bottom: 30px; right: 30px; }
            .cyber-logo .logo-text { font-size: 28px; }
            .time-display { font-size: 8rem; }
        }
    </style>
</head>
<body>
    <!-- background spark -->
    <div class="bg-bling"></div>

    <!-- main clock card -->
    <div class="clock-card">
        <div class="time-display" id="timeDisplay">00:00:00</div>
        <div class="date-display" id="dateDisplay">January 1, 2024</div>
        <div class="day-display" id="dayDisplay">Monday</div>
        
        <button class="format-btn" id="formatBtn">12 HOUR</button>
        
        <div class="seconds-toggle">
            <input type="checkbox" id="secondsToggle" checked>
            <label for="secondsToggle">Show Seconds</label>
        </div>
        
     
    </div>

    <!-- Cyber Rishimuni Logo - EXACT same structure as counter app -->
    <div class="cyber-logo" onclick="window.open('https://cyberrishimuni.github.io/cyberrishimuni/', '_blank')">
        <div class="logo-text">
            <img src="../image.jpg" 
                 alt="Cyber Rishimuni Logo"
                 onerror="this.src='https://via.placeholder.com/40x40/F59E0B/000000?text=CR'">
            CYBER RISHIMUNI
        </div>
    </div>

    <script>
        (function() {
            // DOM elements
            const timeDisplay = document.getElementById('timeDisplay');
            const dateDisplay = document.getElementById('dateDisplay');
            const dayDisplay = document.getElementById('dayDisplay');
            const formatBtn = document.getElementById('formatBtn');
            const secondsToggle = document.getElementById('secondsToggle');

            // State
            let is24Hour = false;
            let showSeconds = true;

            // Format numbers with leading zero
            const formatNumber = (num) => num.toString().padStart(2, '0');

            // Get day name
            const getDayName = (date) => {
                return date.toLocaleDateString('en-US', { weekday: 'long' });
            };

            // Format date
            const formatDate = (date) => {
                return date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric' 
                });
            };

            // Format time based on settings
            const formatTime = (date) => {
                let hours = date.getHours();
                const minutes = formatNumber(date.getMinutes());
                const seconds = formatNumber(date.getSeconds());
                
                if (!is24Hour) {
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    hours = hours % 12 || 12;
                    return showSeconds 
                        ? `${formatNumber(hours)}:${minutes}:${seconds} ${ampm}`
                        : `${formatNumber(hours)}:${minutes} ${ampm}`;
                } else {
                    return showSeconds 
                        ? `${formatNumber(hours)}:${minutes}:${seconds}`
                        : `${formatNumber(hours)}:${minutes}`;
                }
            };

            // Update display
            function updateClock() {
                const now = new Date();
                timeDisplay.textContent = formatTime(now);
                
                if (!showSeconds) {
                    // If seconds are hidden, update every minute
                    setTimeout(updateClock, 60000 - (now.getSeconds() * 1000));
                } else {
                    // Update every second
                    setTimeout(updateClock, 1000 - now.getMilliseconds());
                }
            }

            // Update date (changes less frequently)
            function updateDate() {
                const now = new Date();
                dateDisplay.textContent = formatDate(now);
                dayDisplay.textContent = getDayName(now);
                
                // Update date at midnight
                const tomorrow = new Date(now);
                tomorrow.setDate(tomorrow.getDate() + 1);
                tomorrow.setHours(0, 0, 0, 0);
                const timeUntilMidnight = tomorrow - now;
                
                setTimeout(updateDate, timeUntilMidnight);
            }

            // Toggle time format
            formatBtn.addEventListener('click', () => {
                is24Hour = !is24Hour;
                formatBtn.textContent = is24Hour ? '24 HOUR' : '12 HOUR';
                updateClock();
            });

            // Toggle seconds
            secondsToggle.addEventListener('change', (e) => {
                showSeconds = e.target.checked;
                updateClock();
            });

            // Initialize
            updateClock();
            updateDate();

            // Handle visibility change to keep clock accurate
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    updateClock();
                    updateDate();
                }
            });
        })();
    </script>
</body>
</html>
